name: Build Client EXE

on:
  push:
    branches: [main, master]
    paths:
      - 'client/**'
      - '.github/workflows/build-client-exe.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'client/**'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://your-server.vercel.app' }}

      - name: Build Electron EXE (Windows)
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD || '' }}

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: discord-clone-windows
          path: client/release/*.exe
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://your-server.vercel.app' }}

      - name: Build Electron AppImage (Linux)
        run: npx electron-builder --linux --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: discord-clone-linux
          path: client/release/*.AppImage
          retention-days: 30
